name: waterbuddy_superapp
description: WaterBuddy unified role-based mobile app.
publish_to: none
version: 1.8.1+9

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.0.1
  firebase_crashlytics: ^4.3.1
  firebase_performance: ^0.10.1
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.1
  flutter_svg: ^2.0.10+1
  flutter_map: ^7.0.2
  google_maps_flutter: ^2.14.0
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  geoflutterfire_plus: ^0.0.32
  geocoding: ^3.0.0
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^19.5.0
  http: ^1.2.2
  razorpay_flutter: ^1.3.6
  shared_preferences: ^2.3.2
  firebase_analytics: ^11.6.0
  cloud_functions: ^5.1.3
  flutter_dotenv: ^5.1.0
  firebase_remote_config: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/google_logo.svg
    - assets/ui/tanker.png
    - assets/ui/filtered.png
    - assets/ui/express.png
    - .env.dev
    - .env.staging
    - .env.production

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
